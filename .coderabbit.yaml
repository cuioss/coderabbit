# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
#
# Central CodeRabbit configuration for the cuioss organization.
# Applies to every cuioss repository that does NOT have its own .coderabbit.yaml.
# (A repository-level .coderabbit.yaml fully overrides this file unless it sets
#  `inheritance: true`.)
#
# Rationale for every setting: https://github.com/cuioss/cuioss-organization/blob/main/docs/automatic-review/coderabbit.md
reviews:
  # Balanced profile. It still surfaces nitpick comments, which we treat as
  # signal (see the signal/noise doc). `quiet` would drop them; `assertive`
  # would add more feedback (and more noise).
  profile: chill

  # --- Noise reduction (see doc §"Reduced via config") ---
  sequence_diagrams: false        # auto UML rarely adds value for our changes
  suggested_labels: false         # not part of our workflow
  suggested_reviewers: false      # single-maintainer org
  poem: false                     # (default) no poem
  in_progress_fortune: false      # no "fortune" chatter while a review runs

  # Keep the "Prompt for AI Agents" block: it is the machine-readable payload
  # our automation (plan-marshall) ingests. (Default true; set explicitly.)
  enable_prompt_for_ai_agents: true

  # Drop the interactive "Finishing Touches" checkboxes (docstring / unit-test
  # generators) — UI, not review findings.
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  # Silence always-skipped pre-merge checks: no functions -> docstring coverage
  # is N/A; no linked issues -> issue assessment is N/A.
  pre_merge_checks:
    docstrings:
      mode: "off"
    issue_assessment:
      mode: "off"

  auto_review:
    # Manual opt-out: add the `skip-bot-review` label to any PR to skip its
    # automatic review. All other PRs are still reviewed (auto-review stays on).
    # (Shared bot-skip label; Sourcery/Gemini honoring is documented in the org
    #  automatic-review docs — CodeRabbit is the only bot that honors it centrally.)
    labels:
      - "!skip-bot-review"
    # Skip automatic reviews for bot-authored dependency/propagation PRs — these
    # are gated by CI and auto-merge and do not need CodeRabbit review:
    #   - dependabot[bot]:        Dependabot dependency bumps
    #   - cuioss-release-bot[bot]: consumer-propagation PRs opened by the release
    #     App (parent-version bumps from a consumer list, org-workflow SHA bumps)
    ignore_usernames:
      - "dependabot[bot]"
      - "cuioss-release-bot[bot]"
